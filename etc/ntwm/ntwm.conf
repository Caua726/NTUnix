# ntwm — config do window manager (lido no start; ausente = defaults)
[ntwm]
# tecla modificadora: alt ou win
mod=alt
# janelas na coluna master
nmaster=1
# fracao da largura pra coluna master (0.05..0.95)
mfact=0.55
# espaco entre janelas / borda externa (px)
gap=8
# espessura da borda das janelas (px)
border=2
