# NTUnix desktop policy. Reload atomically with Alt+Shift+R or `ntwmctl reload`.

[general]
mod=Alt
layout=dwindle
gaps_in=8
gaps_out=12
drag_threshold=6

[decoration]
border_size=2
active_border=#7aa2f7
opacity=238
shadow=true
rounding=10
titlebar=true

[animations]
enabled=true
move_ms=180
open_ms=160
workspace_ms=220
focus_ms=120

[dwindle]
default_split_ratio=50

[master]
orientation=left
nmaster=1
mfact=0.55
new_on_top=true

[binds]
bind=Alt, Return, spawn,
bind=Alt, Q, close,
bind=Alt, H, focus, left
bind=Alt, J, focus, down
bind=Alt, K, focus, up
bind=Alt, L, focus, right
bind=Alt Shift, H, move, left
bind=Alt Shift, J, move, down
bind=Alt Shift, K, move, up
bind=Alt Shift, L, move, right
bind=Alt Ctrl, H, resize, left 0.05
bind=Alt Ctrl, J, resize, down 0.05
bind=Alt Ctrl, K, resize, up 0.05
bind=Alt Ctrl, L, resize, right 0.05
bind=Alt, Space, togglefloating,
bind=Alt, F, fullscreen,
bind=Alt, M, maximize,
bind=Alt, T, layout, toggle
bind=Alt Shift, R, reload,
bind=Alt Shift, C, spawn, cmd.exe
bind=Alt Shift, P, spawn, powershell.exe
bind=Alt, 1, workspace, 1
bind=Alt, 2, workspace, 2
bind=Alt, 3, workspace, 3
bind=Alt, 4, workspace, 4
bind=Alt, 5, workspace, 5
bind=Alt, 6, workspace, 6
bind=Alt, 7, workspace, 7
bind=Alt, 8, workspace, 8
bind=Alt, 9, workspace, 9
bind=Alt Shift, 1, movetoworkspace, 1
bind=Alt Shift, 2, movetoworkspace, 2
bind=Alt Shift, 3, movetoworkspace, 3
bind=Alt Shift, 4, movetoworkspace, 4
bind=Alt Shift, 5, movetoworkspace, 5
bind=Alt Shift, 6, movetoworkspace, 6
bind=Alt Shift, 7, movetoworkspace, 7
bind=Alt Shift, 8, movetoworkspace, 8
bind=Alt Shift, 9, movetoworkspace, 9

[workspace 1]
name=1
layout=dwindle

[workspace 2]
name=2
layout=master
orientation=left

[rule win32]
kind=win32
opacity=255
shadow=false
animation=false
titlebar=false

[bar]
enabled=true
height=34
