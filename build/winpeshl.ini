; winpeshl.ini — define o que o WinPE roda no boot, no lugar do shell padrao.
; Vai para \Windows\System32\winpeshl.ini dentro do boot.wim (indice WinPE).
; Os apps rodam em sequencia; wpeinit inicializa o PE (PnP/rede) e o
; ntsession vira o shell da sessao NTUnix (nao retorna).
[LaunchApps]
%SYSTEMROOT%\System32\wpeinit.exe
%SYSTEMDRIVE%\NTUnix\system\bin\ntsession.exe
